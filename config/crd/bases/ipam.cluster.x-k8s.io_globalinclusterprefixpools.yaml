---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: globalinclusterprefixpools.ipam.cluster.x-k8s.io
spec:
  group: ipam.cluster.x-k8s.io
  names:
    categories:
    - cluster-api
    kind: GlobalInClusterPrefixPool
    listKind: GlobalInClusterPrefixPoolList
    plural: globalinclusterprefixpools
    singular: globalinclusterprefixpool
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - description: List of prefixes to allocate sub-prefixes from
      jsonPath: .spec.prefixes
      name: Prefixes
      type: string
    - description: Count of allocatable sub-prefixes in the pool
      jsonPath: .status.ipAddresses.total
      name: Total
      type: integer
    - description: Count of unallocated sub-prefixes in the pool
      jsonPath: .status.ipAddresses.free
      name: Free
      type: integer
    - description: Count of allocated sub-prefixes in the pool
      jsonPath: .status.ipAddresses.used
      name: Used
      type: integer
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          GlobalInClusterPrefixPool is the Schema for the global inclusterprefixpools API.
          This pool type is cluster scoped. IPAddressClaims can reference
          pools of this type from any namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: InClusterPrefixPoolSpec defines the desired state of InClusterPrefixPool.
            properties:
              allocationPrefixLength:
                default: 64
                description: |-
                  AllocationPrefixLength is the prefix length of each allocated
                  sub-prefix (e.g. 64 means /64 allocations). Defaults to 64.
                  Must be >= the prefix length of each entry in Prefixes and <= 128.
                maximum: 128
                minimum: 1
                type: integer
              excludedPrefixes:
                description: |-
                  ExcludedPrefixes lists IPs/CIDRs/ranges to exclude from allocation.
                  Any candidate sub-prefix overlapping an excluded entry is skipped.
                items:
                  type: string
                type: array
              gateway:
                description: |-
                  Gateway is the next-hop IPv6 address carried unchanged to every
                  allocated IPAddress.Spec.Gateway. Unlike IP pools, the gateway does
                  NOT block any prefix from being allocated — it is informational only.
                type: string
              prefixes:
                description: |-
                  Prefixes is a list of IPv6 CIDRs from which sub-prefixes are allocated.
                  Each entry must be a network-aligned CIDR (e.g. "fd00::/48").
                items:
                  type: string
                type: array
            required:
            - prefixes
            type: object
          status:
            description: InClusterPrefixPoolStatus defines the observed state of InClusterPrefixPool.
            properties:
              ipAddresses:
                description: |-
                  Addresses reports the count of total, free, and used prefixes in the pool.
                  The JSON tag is "ipAddresses" to match the InClusterIPPool status shape,
                  keeping a consistent status contract across pool types.
                properties:
                  free:
                    description: |-
                      Free is the count of unallocated sub-prefixes.
                      Counts greater than int can contain will report as math.MaxInt.
                    type: integer
                  outOfRange:
                    description: |-
                      OutOfRange is the count of allocated prefixes currently non-allocatable
                      under spec (outside spec.Prefixes, overlapped by spec.ExcludedPrefixes,
                      or with the wrong prefix length).
                      Counts greater than int can contain will report as math.MaxInt.
                    type: integer
                  total:
                    description: |-
                      Total is the total number of allocatable sub-prefixes in the pool.
                      Counts greater than int can contain will report as math.MaxInt.
                    type: integer
                  used:
                    description: |-
                      Used is the count of allocated sub-prefixes.
                      Counts greater than int can contain will report as math.MaxInt.
                    type: integer
                required:
                - free
                - outOfRange
                - total
                - used
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
