# permissions for end users to edit inclusterprefixpools.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inclusterprefixpool-editor-role
rules:
- apiGroups:
  - ipam.cluster.x-k8s.io
  resources:
  - inclusterprefixpools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ipam.cluster.x-k8s.io
  resources:
  - inclusterprefixpools/status
  verbs:
  - get
